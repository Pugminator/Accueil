<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma chaîne YouTube</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Bienvenue sur ma chaîne YouTube</h1>
    <p>Gaming • Tech • Vlogs • Création de contenu</p>
  </header>

  <section class="about">
    <h2>À propos</h2>
    <p>
      Salut ! Je partage des vidéos sur ma passion. Abonne-toi pour ne rien rater 🚀
    </p>

    <a class="btn" href="http://www.youtube.com/@Pugminator?sub_confirmation=1" target="_blank">
      S’abonner sur YouTube
    </a>
  </section>

  <section class="videos">
    <h2>Dernière vidéo</h2>

    <!-- Remplace VIDEO_ID -->
    <iframe 
      width="560" 
      height="315" 
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="YouTube video player"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </section>

  <footer>
    <p>© 2026 Ma chaîne YouTube</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
